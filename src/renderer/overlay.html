<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kronos Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 22px 28px;
      text-align: center;
      width: 340px;
      -webkit-app-region: drag;
      transform: scale(0.92);
      opacity: 0;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s ease;
    }

    .card.visible {
      transform: scale(1);
      opacity: 1;
    }

    .icon {
      font-size: 26px;
      margin-bottom: 10px;
      line-height: 1;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: #e5e5e5;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 12px;
      color: #737373;
      margin-bottom: 14px;
    }

    .bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #4f46e5;
      border-radius: 99px;
      width: 100%;
      transform-origin: left;
      transition: none;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">🎯</div>
    <div class="title" id="name">App</div>
    <div class="sub" id="sub">Blocked during your focus session</div>
    <div class="bar-wrap">
      <div class="bar" id="bar"></div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card')
    const nameEl = document.getElementById('name')
    const subEl = document.getElementById('sub')
    const barEl = document.getElementById('bar')

    let timer = null
    const DURATION = 3000

    function show(name, type) {
      if (timer) clearTimeout(timer)

      nameEl.textContent = name
      subEl.textContent = type === 'site'
        ? `${name} is blocked during your focus session`
        : `${name} is blocked during your focus session`

      // Reset and animate bar
      barEl.style.transition = 'none'
      barEl.style.transform = 'scaleX(1)'
      card.classList.add('visible')

      // Start countdown bar
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          barEl.style.transition = `transform ${DURATION}ms linear`
          barEl.style.transform = 'scaleX(0)'
        })
      })

      timer = setTimeout(() => {
        card.classList.remove('visible')
      }, DURATION)
    }

    window.overlayAPI.onShow((name, type) => show(name, type))
  </script>
</body>
</html>

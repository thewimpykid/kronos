appId: com.kronos.screentimetracker
productName: Kronos
copyright: Copyright © 2026

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  executableName: Kronos

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

electronVersion: 29.0.1

publish:
  provider: github
  owner: thewimpykid
  repo: kronos
